name: CI and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web release
        run: flutter build web --release --no-tree-shake-icons

  android-internal:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check Android release secrets
        id: secrets_check
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          PLAY_STORE_SERVICE_ACCOUNT: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for key in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD GOOGLE_SERVICES_JSON_BASE64 PLAY_STORE_SERVICE_ACCOUNT; do
            if [ -z "${!key}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: steps.secrets_check.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Flutter
        if: steps.secrets_check.outputs.ready == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Restore Android release secrets
        if: steps.secrets_check.outputs.ready == 'true'
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          cat > android/key.properties <<EOF
          KEYSTORE_PATH=${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Get dependencies
        if: steps.secrets_check.outputs.ready == 'true'
        run: flutter pub get

      - name: Build Android AAB for Play Internal
        if: steps.secrets_check.outputs.ready == 'true'
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Upload Android AAB artifact
        if: steps.secrets_check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-internal-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload to Play Store Internal
        if: steps.secrets_check.outputs.ready == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.sscquizarena.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Skip Android internal release
        if: steps.secrets_check.outputs.ready != 'true'
        run: echo "Android internal release skipped because one or more GitHub secrets are not configured."

  android-production:
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Check Android release secrets
        id: secrets_check
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          PLAY_STORE_SERVICE_ACCOUNT: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        run: |
          missing=0
          for key in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD GOOGLE_SERVICES_JSON_BASE64 PLAY_STORE_SERVICE_ACCOUNT; do
            if [ -z "${!key}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: steps.secrets_check.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Flutter
        if: steps.secrets_check.outputs.ready == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Restore Android release secrets
        if: steps.secrets_check.outputs.ready == 'true'
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          cat > android/key.properties <<EOF
          KEYSTORE_PATH=${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Get dependencies
        if: steps.secrets_check.outputs.ready == 'true'
        run: flutter pub get

      - name: Build Android AAB for Play Production
        if: steps.secrets_check.outputs.ready == 'true'
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          flutter build appbundle --release --build-name="$VERSION_NAME" --build-number=${{ github.run_number }}

      - name: Upload Android production AAB artifact
        if: steps.secrets_check.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-production-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Store Production
        if: steps.secrets_check.outputs.ready == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.sscquizarena.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed

      - name: Skip Android production release
        if: steps.secrets_check.outputs.ready != 'true'
        run: echo "Android production release skipped because one or more GitHub secrets are not configured."

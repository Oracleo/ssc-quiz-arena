name: ssc_quiz_arena
description: SSC Quiz Arena — India's best SSC CGL MCQ practice app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # State & Navigation
  provider: ^6.1.2
  go_router: ^14.2.0

  # Persistence
  shared_preferences: ^2.3.2
  connectivity_plus: ^7.0.0

  # Utilities
  url_launcher: ^6.2.5
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
